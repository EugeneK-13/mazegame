<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fun Maze 🌟</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;overflow:hidden;width:100vw;height:100vh;background:#4DB6AC;touch-action:none;}
/* Use Nunito (Google font, excellent Cyrillic support) everywhere */
.game-font{font-family:'Nunito',sans-serif;font-weight:900;}
#gameContainer{width:100vw;height:100vh;position:relative;overflow:hidden;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:flex-start;}
.screen.active{display:flex;}
.sky-bg{background:linear-gradient(180deg,#4DB6AC 0%,#80CBC4 50%,#B2DFDB 100%);}
.sun{position:absolute;top:20px;right:30px;width:78px;height:78px;background:radial-gradient(circle,#FFE033,#FFAA00);border-radius:50%;box-shadow:0 0 30px #FFE03388;animation:sunPulse 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 30px #FFE03388;}50%{box-shadow:0 0 60px #FFE033CC;}}
.cloud{position:absolute;background:rgba(255,255,255,0.65);border-radius:50px;animation:cloudFloat linear infinite;}
@keyframes cloudFloat{0%{transform:translateX(-250px);}100%{transform:translateX(110vw);}}
.btn{font-family:'Nunito',sans-serif;font-weight:900;border:none;border-radius:25px;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 0 rgba(0,0,0,0.2);touch-action:manipulation;}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.2);}
.btn-big{font-size:30px;padding:18px 40px;border-radius:30px;}
.btn-green{background:linear-gradient(145deg,#6EE86E,#3CC33C);color:white;}
.btn-blue{background:linear-gradient(145deg,#5BB8FF,#2288EE);color:white;}
.btn-yellow{background:linear-gradient(145deg,#FFE033,#FFBB00);color:#664400;}
.btn-teal{background:linear-gradient(145deg,#4DB6AC,#00897B);color:white;}
#titleScreen{justify-content:center;gap:16px;padding:20px;}
.game-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(42px,10vw,80px);color:#E0F2F1;text-shadow:4px 4px 0 #004D40,8px 8px 0 rgba(0,0,0,0.12);text-align:center;line-height:1.15;animation:titleBounce 2s ease-in-out infinite;}
@keyframes titleBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
#charScreen{padding:18px;gap:12px;overflow-y:auto;}
.screen-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(26px,7vw,48px);color:#E0F2F1;text-shadow:3px 3px 0 #004D40;text-align:center;}
.char-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:13px;width:100%;max-width:600px;}
.char-card{background:white;border-radius:22px;padding:13px 15px;cursor:pointer;border:5px solid transparent;transition:all 0.2s;text-align:center;min-width:115px;flex:1;box-shadow:0 5px 18px rgba(0,0,0,0.14);}
.char-card:hover,.char-card.selected{border-color:#26A69A;transform:scale(1.06);box-shadow:0 10px 28px rgba(38,166,154,0.5);}
.char-emoji{font-size:58px;display:block;margin-bottom:6px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.3));}
.char-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:#333;}
#levelScreen{padding:14px;gap:10px;overflow-y:auto;}
.level-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;width:100%;max-width:550px;padding-bottom:8px;}
.level-btn{background:white;border-radius:16px;padding:9px 12px;cursor:pointer;border:4px solid #26A69A;transition:all 0.2s;text-align:center;min-width:85px;flex:1;box-shadow:0 4px 11px rgba(0,0,0,0.11);}
.level-btn:hover{transform:scale(1.08);box-shadow:0 8px 20px rgba(38,166,154,0.5);}
.level-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;color:#00796B;}
.level-stars{font-size:13px;}
.level-name{font-size:11px;color:#888;}
#gameScreen{flex-direction:column;align-items:center;background:linear-gradient(180deg,#4DB6AC,#80CBC4);}
#gameHeader{width:100%;background:rgba(255,255,255,0.95);padding:8px 13px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(0,0,0,0.12);z-index:10;flex-shrink:0;}
.header-info{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:#00796B;}
#canvasWrapper{flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;padding:4px;}
#gameCanvas{display:block;border-radius:15px;box-shadow:0 8px 28px rgba(0,0,0,0.24);touch-action:none;}
#arrowControls{display:grid;grid-template-columns:repeat(3,62px);grid-template-rows:repeat(2,62px);gap:6px;padding:8px 8px calc(8px + env(safe-area-inset-bottom,0px)) 8px;flex-shrink:0;justify-content:center;background:rgba(77,182,172,0.4);}
.arrow-btn{width:62px;height:62px;background:rgba(255,255,255,0.97);border:4px solid #26A69A;border-radius:16px;font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.18);user-select:none;touch-action:manipulation;-webkit-user-select:none;}
.arrow-btn:active{transform:scale(0.88);background:rgba(38,166,154,0.5);}
/* ---- Collectible counter bar ---- */
#collectBar{width:100%;background:rgba(255,255,255,0.9);padding:4px 14px;display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:#00796B;flex-shrink:0;border-bottom:2px solid rgba(38,166,154,0.3);}
/* ---- Overlays ---- */
#puzzleOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:100;}
#puzzleOverlay.active{display:flex;}
.puzzle-box{background:white;border-radius:28px;padding:24px;max-width:92vw;width:420px;text-align:center;box-shadow:0 18px 55px rgba(0,0,0,0.34);}
.puzzle-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:#00796B;margin-bottom:12px;}
#inMazePuzzleOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,55,45,0.62);display:none;align-items:center;justify-content:center;z-index:110;}
#inMazePuzzleOverlay.active{display:flex;}
.imp-box{background:linear-gradient(145deg,#E0F7FA,#FFFFFF);border-radius:26px;padding:22px;max-width:92vw;width:390px;text-align:center;box-shadow:0 18px 55px rgba(0,0,0,0.38);border:4px solid #26A69A;}
.imp-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:#00796B;margin-bottom:10px;}
.imp-options{display:flex;gap:13px;justify-content:center;margin:13px 0;flex-wrap:wrap;}
.imp-opt{font-family:'Nunito',sans-serif;font-weight:900;font-size:30px;background:#E0F2F1;border:4px solid #B2DFDB;border-radius:16px;width:82px;height:82px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.imp-opt:active{transform:scale(0.9);}
.imp-opt.correct{background:#AAFFAA;border-color:#44CC44;}
.imp-opt.wrong{background:#FFAAAA;border-color:#CC4444;animation:shake 0.3s;}
/* ---- Victory / Final ---- */
#victoryScreen{justify-content:center;align-items:center;gap:14px;}
#finalScreen{justify-content:center;align-items:center;gap:14px;}
.victory-emoji{font-size:96px;animation:victoryPop 0.5s ease-out;}
@keyframes victoryPop{0%{transform:scale(0);}80%{transform:scale(1.2);}100%{transform:scale(1);}}
.victory-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(32px,8vw,64px);color:#E0F2F1;text-shadow:4px 4px 0 #004D40;text-align:center;}
#confettiCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;}
#musicBtn,#musicBtn2{font-size:25px;background:white;border:3px solid #26A69A;border-radius:50%;width:46px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.12);flex-shrink:0;}
#langBtn{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;background:white;border:3px solid #26A69A;border-radius:18px;padding:7px 13px;cursor:pointer;color:#00796B;box-shadow:0 3px 8px rgba(0,0,0,0.12);flex-shrink:0;}
#homeBtn{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;background:white;border:3px solid #26A69A;border-radius:17px;padding:7px 14px;cursor:pointer;color:#00796B;box-shadow:0 3px 8px rgba(0,0,0,0.12);}
.color-circles{display:flex;gap:14px;justify-content:center;margin:11px 0;flex-wrap:wrap;}
.color-circle{width:84px;height:84px;border-radius:50%;cursor:pointer;border:6px solid white;box-shadow:0 5px 14px rgba(0,0,0,0.18);transition:transform 0.15s;font-size:34px;display:flex;align-items:center;justify-content:center;}
.color-circle:active{transform:scale(0.9);}
.apple-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:11px 0;}
.apple-item{font-size:50px;cursor:pointer;transition:transform 0.15s;user-select:none;}
.drag-area{min-height:170px;position:relative;background:#E0F7FA;border-radius:18px;margin:9px 0;overflow:hidden;}
.mini-puzzle-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
.puzzle-piece{background:#E0F2F1;border-radius:13px;width:76px;height:76px;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all 0.2s;border:4px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.puzzle-piece.correct{background:#AAFFAA;border-color:#44CC44;}
.puzzle-piece.wrong{background:#FFAAAA;border-color:#CC4444;}
.auto-next-bar{height:8px;background:rgba(255,255,255,0.3);border-radius:4px;margin-top:4px;width:75%;overflow:hidden;}
.auto-next-fill{height:100%;background:#E0F2F1;border-radius:4px;}
.puz-msg{font-family:'Nunito',sans-serif;font-weight:700;font-size:21px;margin-top:8px;min-height:30px;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="confettiCanvas"></canvas>
<div id="inMazePuzzleOverlay"><div class="imp-box" id="inMazePuzzleBox"></div></div>
<div id="puzzleOverlay"><div class="puzzle-box" id="puzzleBox"></div></div>

<!-- TITLE -->
<div id="titleScreen" class="screen sky-bg active">
  <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;">
    <div class="sun">☀️</div>
    <div style="font-size:76px;">🌟</div>
    <div class="game-title" id="gameTitleText">Fun<br>Maze!</div>
    <button class="btn btn-big btn-teal" onclick="showCharSelect()" id="btnPlay">🎮 Play!</button>
    <div style="display:flex;gap:12px;align-items:center;">
      <button id="musicBtn" onclick="toggleMusic()">🎵</button>
      <button id="langBtn" onclick="toggleLang()">🇷🇺 RU</button>
      <button id="bugBtn" onclick="reportBug()" style="font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;background:white;border:3px solid #FF7043;border-radius:18px;padding:7px 12px;cursor:pointer;color:#FF5722;box-shadow:0 3px 8px rgba(0,0,0,0.12);flex-shrink:0;">🐛 Bug</button>
    </div>
  </div>
</div>

<!-- CHAR SELECT -->
<div id="charScreen" class="screen sky-bg">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;gap:11px;padding:13px;overflow-y:auto;">
    <div class="screen-title" id="txtChooseHero">Choose your hero!</div>
    <div class="char-grid">
      <div class="char-card" onclick="selectChar(0)"><span class="char-emoji">🐰</span><div class="char-name">Fluffy</div></div>
      <div class="char-card" onclick="selectChar(1)"><span class="char-emoji">🐶</span><div class="char-name">JabJatz</div></div>
      <div class="char-card" onclick="selectChar(2)"><span class="char-emoji">🏎️</span><div class="char-name">RedBird</div></div>
      <div class="char-card" onclick="selectChar(3)"><span class="char-emoji">🤡</span><div class="char-name">Joker</div></div>
      <div class="char-card" onclick="selectChar(4)"><span class="char-emoji">👶</span><div class="char-name">Boss</div></div>
    </div>
    <button class="btn btn-yellow" style="font-size:21px;padding:11px 26px;" onclick="showTitle()" id="btnBackChar">🔙 Back</button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="levelScreen" class="screen sky-bg">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;gap:9px;padding:11px;overflow-y:auto;">
    <div class="screen-title" id="txtChooseLevel">Choose Level!</div>
    <div style="font-size:56px;" id="selectedCharDisplay">🐰</div>
    <div class="level-grid" id="levelGrid"></div>
    <button class="btn btn-yellow" style="font-size:21px;padding:11px 26px;" onclick="showCharSelect()" id="btnBackLevel">🔙 Back</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="gameHeader">
    <button id="homeBtn" onclick="showLevelSelect()">🏠</button>
    <div class="header-info" id="levelInfo">Level 1</div>
    <div style="font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));" id="charDisplay">🐰</div>
    <button id="musicBtn2" onclick="toggleMusic()">🎵</button>
  </div>
  <div id="collectBar"><span id="collectIcon">⭐</span><span id="collectCount">0/3</span></div>
  <div id="canvasWrapper"><canvas id="gameCanvas"></canvas></div>
  <div id="arrowControls">
    <div></div><div class="arrow-btn" id="btnUp">⬆️</div><div></div>
    <div class="arrow-btn" id="btnLeft">⬅️</div><div class="arrow-btn" id="btnDown">⬇️</div><div class="arrow-btn" id="btnRight">➡️</div>
  </div>
</div>

<!-- VICTORY -->
<div id="victoryScreen" class="screen sky-bg">
  <div class="victory-emoji">🎉</div>
  <div class="victory-title" id="txtVictory">Level Complete!</div>
  <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:#E0F2F1;text-shadow:2px 2px 0 #004D40;" id="victoryLevelNum">Level 1</div>
  <div style="font-size:46px;" id="victoryStars">⭐⭐⭐</div>
  <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:20px;color:#B2DFDB;" id="txtAutoNext">Next in 4...</div>
  <div class="auto-next-bar"><div class="auto-next-fill" id="autoNextFill" style="width:100%;"></div></div>
  <div style="display:flex;gap:11px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
    <button class="btn btn-green" style="font-size:24px;padding:13px 22px;" onclick="nextLevelNow()" id="btnNext">Next ➡️</button>
    <button class="btn btn-blue" style="font-size:24px;padding:13px 22px;" onclick="replayLevel()" id="btnAgain">🔄 Again</button>
    <button class="btn btn-yellow" style="font-size:24px;padding:13px 22px;" onclick="showLevelSelect()" id="btnMenuV">🏠 Menu</button>
  </div>
</div>

<!-- FINAL -->
<div id="finalScreen" class="screen sky-bg">
  <div style="font-size:86px;animation:victoryPop 1s;">🏆</div>
  <div class="victory-title" id="txtFinal">You WIN!</div>
  <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:22px;color:#B2DFDB;text-align:center;padding:0 16px;" id="txtFinalSub">All 30 levels done!<br>You are a true hero! 🌟</div>
  <div style="font-size:64px;animation:titleBounce 1s ease-in-out infinite;">🎊🎉🎊</div>
  <button class="btn btn-big btn-teal" onclick="showCharSelect()" id="btnPlayAgain">🎮 Play Again</button>
</div>
</div>

<script>
// ===== LANGUAGE =====
let lang='en';
const T={
  en:{
    title:'Fun\nMaze!',play:'🎮 Play!',chooseHero:'Choose your hero!',chooseLevel:'Choose Level!',back:'🔙 Back',
    next:'Next ➡️',again:'🔄 Again',menu:'🏠 Menu',levelComplete:'Level\nCompleted!',autoNext:'Next in ',
    youWin:'You WIN!',finalSub:'All 30 levels done!\nYou are a true hero! 🌟',playAgain:'🎮 Play Again',
    level:'Level',correct:'🎉 Correct!',tryAgain:'❌ Try again!',wellDone:'🎉 Well done!',
    notThat:'❌ Not that one!',amazing:'🎉 Amazing!',greatJob:'🌟 Great Job!',excellent:'⭐ Excellent!',
    tapColor:'🎨 Tap the ',dragKey:'🔑 Drag the key to the lock!',unlocked:'🎉 Unlocked!',
    tapAll:'Tap all ',there:'Exactly ',findThem:'Find all items in the maze first!',goFind:'Go collect them!',
    collectAll:'Collect all before exit!',notAllCollected:'Collect all items first! ',
    tapOrder:'🧩 Tap in order!',howMany:'🔢 How many ',tapNum:'🔢 Tap the number ',
    different:'🎨 Which one is different?',findDiff:"Tap the odd one out!",
    tapAllColor:'🎨 Tap all ',circles:' circles!',tapColors:'🎨 Tap in order!',
    collected:'',of:'/',impSolve:'🧩 Solve the puzzle to collect!',
    impWrong:'❌ Wrong! Try again!',impRight:'🎉 Got it!',
    whatMissing:'What number is missing?',whatShape:'Which comes next?',
    whatFruit:'Which is different?',whatColor:'Which color comes next?',
    whatClothes:'Which is the odd one out?',
    bigger:'Which is bigger?',smaller:'Which is smaller?',
    whatSound:'What sound does this animal make?',
    shadow:'Which shadow matches?',missing:'Which one is missing?',
    simpleAdd:'How much is',plus:'plus',
  },
  ru:{
    title:'Весёлый\nЛабиринт!',play:'🎮 Играть!',chooseHero:'Выбери героя!',chooseLevel:'Выбери уровень!',back:'🔙 Назад',
    next:'Далее ➡️',again:'🔄 Ещё раз',menu:'🏠 Меню',levelComplete:'Уровень\nпройден!',autoNext:'Далее через ',
    youWin:'Ты победил!',finalSub:'Все 30 уровней пройдены!\nТы настоящий герой! 🌟',playAgain:'🎮 Играть снова',
    level:'Уровень',correct:'🎉 Правильно!',tryAgain:'❌ Попробуй ещё!',wellDone:'🎉 Молодец!',
    notThat:'❌ Не то!',amazing:'🎉 Отлично!',greatJob:'🌟 Умница!',excellent:'⭐ Превосходно!',
    tapColor:'🎨 Нажми на ',dragKey:'🔑 Перетащи ключ к замку!',unlocked:'🎉 Открыто!',
    tapAll:'Нажми все ',there:'Их ровно ',findThem:'Сначала собери все предметы в лабиринте!',goFind:'Иди собери!',
    collectAll:'Собери все предметы!',notAllCollected:'Сначала собери все! ',
    tapOrder:'🧩 Нажимай по порядку!',howMany:'🔢 Сколько ',tapNum:'🔢 Нажми цифру ',
    different:'🎨 Что лишнее?',findDiff:'Нажми на лишнее!',
    tapAllColor:'🎨 Нажми все ',circles:' кружка!',tapColors:'🎨 Нажми по порядку!',
    collected:'',of:'/',impSolve:'🧩 Реши задачку чтобы собрать!',
    impWrong:'❌ Неверно! Попробуй снова!',impRight:'🎉 Верно!',
    whatMissing:'Какая цифра пропущена?',whatShape:'Что следует дальше?',
    whatFruit:'Что лишнее?',whatColor:'Какой цвет следующий?',
    whatClothes:'Что здесь лишнее?',
    bigger:'Что больше?',smaller:'Что меньше?',
    whatSound:'Какой звук издаёт животное?',
    shadow:'Какая тень подходит?',missing:'Чего не хватает?',
    simpleAdd:'Сколько будет',plus:'плюс',
  }
};
function t(k){return T[lang][k]||T.en[k]||k;}
function randomSuccess(){const opts=['correct','wellDone','amazing','greatJob','excellent'];return t(opts[Math.floor(Math.random()*opts.length)]);}
function toggleLang(){lang=lang==='en'?'ru':'en';document.getElementById('langBtn').textContent=lang==='en'?'🇷🇺 RU':'🇬🇧 EN';updateAllText();}
function updateAllText(){
  document.getElementById('gameTitleText').innerHTML=t('title').replace('\n','<br>');
  document.getElementById('btnPlay').textContent=t('play');
  document.getElementById('txtChooseHero').textContent=t('chooseHero');
  document.getElementById('txtChooseLevel').textContent=t('chooseLevel');
  document.querySelectorAll('#btnBackChar,#btnBackLevel').forEach(b=>b.textContent=t('back'));
  document.getElementById('txtVictory').innerHTML=t('levelComplete').replace('\n','<br>');
  document.getElementById('btnNext').textContent=t('next');
  document.getElementById('btnAgain').textContent=t('again');
  document.getElementById('btnMenuV').textContent=t('menu');
  document.getElementById('txtFinal').textContent=t('youWin');
  document.getElementById('txtFinalSub').innerHTML=t('finalSub').replace('\n','<br>');
  document.getElementById('btnPlayAgain').textContent=t('playAgain');
}

// ===== AUDIO =====
let musicOn=true,audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){type=type||'sine';vol=vol||0.3;try{const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);o.start();o.stop(a.currentTime+dur);}catch(e){}}
function playWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.4),i*130));}
function playCollect(){playTone(880,0.12,'sine',0.3);setTimeout(()=>playTone(1047,0.12,'sine',0.3),90);}
function playDoor(){[392,523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,0.35,'triangle',0.35),i*90));}
function playStep(){if(musicOn)playTone(280+Math.random()*60,0.04,'sine',0.04);}
function playBump(){playTone(120,0.08,'square',0.15);}
function playAlert(){playTone(330,0.15,'square',0.25);setTimeout(()=>playTone(220,0.15,'square',0.2),160);}
function toggleMusic(){musicOn=!musicOn;document.querySelectorAll('#musicBtn,#musicBtn2').forEach(b=>b.textContent=musicOn?'🎵':'🔇');}
function reportBug(){
  const tg=window.Telegram?.WebApp;
  const user=tg?.initDataUnsafe?.user;
  const userName=user?(user.username?'@'+user.username:(user.first_name||'unknown')):'unknown';
  const userId=user?user.id:'?';
  const lvl='Level '+(currentLevel+1);
  const text='🐛 Bug Report — Fun Maze\n👤 '+userName+' (id:'+userId+')\n🎮 '+lvl+'\n⏱️ '+new Date().toLocaleString();
  const btn=document.getElementById('bugBtn');
  btn.textContent='⏳';btn.disabled=true;
  fetch('https://api.telegram.org/bot8654893124:AAHLxrQ2RMagzK9MfBVg5EW8DEKlQyPzz8U/sendMessage',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:'-1003976023787',text:text})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){btn.textContent='✅ Sent!';btn.style.borderColor='#4CAF50';btn.style.color='#388E3C';}
    else{btn.textContent='❌ Error';btn.style.borderColor='#f44336';btn.style.color='#f44336';}
    btn.disabled=false;
    setTimeout(()=>{btn.textContent='🐛 Bug';btn.style.borderColor='#FF7043';btn.style.color='#FF5722';},3000);
  }).catch(()=>{
    btn.textContent='❌ Error';btn.disabled=false;
    setTimeout(()=>{btn.textContent='🐛 Bug';btn.style.borderColor='#FF7043';btn.style.color='#FF5722';},3000);
  });
}

// ===== RICH IN-MAZE PUZZLE BANK =====
// 15 different puzzle varieties, randomly chosen per level+attempt
function getInMazePuzzle(lvl){
  // Build pool of available puzzle types - more variety as levels increase
  const pool=[];
  // Always available
  pool.push('number_seq','fruit_odd','color_seq','clothes_odd');
  if(lvl>=8) pool.push('animal_sound','simple_add','shape_pattern');
  if(lvl>=15) pool.push('number_add','color3_odd','size_order');
  // Pick one randomly
  const type=pool[Math.floor(Math.random()*pool.length)];
  return buildIMP(type,lvl);
}

function buildIMP(type,lvl){
  if(type==='number_seq'){
    // "1 2 3 ? 5" — pick a different gap each time
    const start=1+Math.floor(Math.random()*5);
    const gapPos=1+Math.floor(Math.random()*3); // which of positions 0-4 is missing
    const seq=[start,start+1,start+2,start+3,start+4];
    const correct=seq[gapPos];
    const display=seq.map((v,i)=>i===gapPos?'?':String(v)).join(' → ');
    const w1=correct-1<1?correct+2:correct-1;
    const w2=correct+1>9?correct-2:correct+1;
    const opts=[String(correct),String(w1),String(w2)];shuffle(opts);
    return{q:t('whatMissing'),seq:display,opts,correct:String(correct)};
  }
  if(type==='fruit_odd'){
    const sets=[
      {main:'🍎🍎🍎',odd:'🍌',opts:['🍌','🍎','🍊']},
      {main:'🍊🍊🍊',odd:'🍇',opts:['🍊','🍇','🍓']},
      {main:'🍓🍓🍓',odd:'🥝',opts:['🥝','🍓','🍑']},
      {main:'🍇🍇🍇',odd:'🍑',opts:['🍇','🍑','🫐']},
      {main:'🍌🍌🍌',odd:'🍒',opts:['🍌','🍒','🥭']},
      {main:'🥝🥝🥝',odd:'🍈',opts:['🍈','🥝','🍋']},
    ];
    const s=sets[Math.floor(Math.random()*sets.length)];
    const items=(s.main+s.odd).split('');shuffle(items);
    const opts=[...s.opts];shuffle(opts);
    return{q:t('whatFruit'),seq:items.join(' '),opts,correct:s.odd};
  }
  if(type==='color_seq'){
    const seqs=[
      {seq:'🔴 🔵 🔴 🔵 ?',ans:'🔴',opts:['🔴','🟢','🟡']},
      {seq:'🟡 🟢 🟡 🟢 ?',ans:'🟡',opts:['🟡','🔵','🟠']},
      {seq:'🟣 🟠 🟣 🟠 ?',ans:'🟣',opts:['🟣','🔴','🟡']},
      {seq:'🔴 🔴 🔵 🔴 🔴 ?',ans:'🔵',opts:['🔵','🔴','🟡']},
      {seq:'🟢 🟡 🟢 🟡 🟢 ?',ans:'🟡',opts:['🟡','🔵','🟠']},
    ];
    const s=seqs[Math.floor(Math.random()*seqs.length)];
    const opts=[...s.opts];shuffle(opts);
    return{q:t('whatColor'),seq:s.seq,opts,correct:s.ans};
  }
  if(type==='clothes_odd'){
    const sets=[
      {seq:'👗 👗 👗 👟',odd:'👟',opts:['👟','👗','🧣']},
      {seq:'👠 👠 👟 👠',odd:'👟',opts:['👟','👠','🧢']},
      {seq:'🧢 🎩 🧢 🧢',odd:'🎩',opts:['🎩','🧢','👒']},
      {seq:'🧤 🧤 🧤 🧦',odd:'🧦',opts:['🧦','🧤','🧣']},
      {seq:'👒 👒 🧢 👒',odd:'🧢',opts:['🧢','👒','🎩']},
    ];
    const s=sets[Math.floor(Math.random()*sets.length)];
    const opts=[...s.opts];shuffle(opts);
    return{q:t('whatClothes'),seq:s.seq,opts,correct:s.odd};
  }
  if(type==='bigger'){
    const pairs=[
      {a:'🐘',b:'🐭',bigger:'🐘',opts:['🐘','🐭','🐇']},
      {a:'🦁',b:'🐤',bigger:'🦁',opts:['🦁','🐤','🐛']},
      {a:'🚌',b:'🚲',bigger:'🚌',opts:['🚌','🚲','⛵']},
      {a:'🌳',b:'🌱',bigger:'🌳',opts:['🌳','🌱','🌵']},
      {a:'🐋',b:'🐠',bigger:'🐋',opts:['🐋','🐠','🦋']},
    ];
    const p=pairs[Math.floor(Math.random()*pairs.length)];
    const opts=[...p.opts];shuffle(opts);
    return{q:t('bigger'),seq:`${p.a}   ${p.b}`,opts,correct:p.bigger};
  }
  if(type==='animal_sound'){
    const animals=[
      {animal:'🐄',sound:lang==='ru'?'Муу':'Moo',wrong:['Гав','Мяу']},
      {animal:'🐶',sound:lang==='ru'?'Гав':'Woof',wrong:['Мур','Мяу']},
      {animal:'🐱',sound:lang==='ru'?'Мяу':'Meow',wrong:['Гав','Ква']},
      {animal:'🐸',sound:lang==='ru'?'Ква':'Ribbit',wrong:['Гав','Пи']},
      {animal:'🐑',sound:lang==='ru'?'Бее':'Baa',wrong:['Гав','Мяу']},
    ];
    const a=animals[Math.floor(Math.random()*animals.length)];
    const opts=[a.sound,...a.wrong];shuffle(opts);
    return{q:t('whatSound'),seq:a.animal,opts,correct:a.sound};
  }
  if(type==='simple_add'){
    const n1=1+Math.floor(Math.random()*4);
    const n2=1+Math.floor(Math.random()*3);
    const ans=n1+n2;
    const w1=ans-1<1?ans+2:ans-1;
    const w2=ans+1;
    const opts=[String(ans),String(w1),String(w2)];shuffle(opts);
    return{q:`${t('simpleAdd')} ${n1} ${t('plus')} ${n2}?`,seq:`${'🌟'.repeat(n1)}  +  ${'⭐'.repeat(n2)}`,opts,correct:String(ans)};
  }
  if(type==='shape_pattern'){
    const patterns=[
      {seq:'🔵 🔴 🔵 🔴 ?',ans:'🔵',opts:['🔵','🔴','🟡']},
      {seq:'⭐ ⭐ 🌟 ⭐ ⭐ ?',ans:'🌟',opts:['🌟','⭐','💫']},
      {seq:'🟦 🟥 🟦 🟥 ?',ans:'🟦',opts:['🟦','🟥','🟨']},
      {seq:'🐱 🐶 🐱 🐶 ?',ans:'🐱',opts:['🐱','🐶','🐭']},
      {seq:'🍎 🍎 🍊 🍎 🍎 ?',ans:'🍊',opts:['🍊','🍎','🍋']},
    ];
    const p=patterns[Math.floor(Math.random()*patterns.length)];
    const opts=[...p.opts];shuffle(opts);
    return{q:t('whatShape'),seq:p.seq,opts,correct:p.ans};
  }
  if(type==='number_add'){
    const n1=2+Math.floor(Math.random()*4);
    const n2=2+Math.floor(Math.random()*4);
    const ans=n1+n2;
    const w1=ans-2;const w2=ans+2;
    const opts=[String(ans),String(w1),String(w2)];shuffle(opts);
    return{q:`${t('simpleAdd')} ${n1} ${t('plus')} ${n2}?`,seq:`${n1} + ${n2} = ?`,opts,correct:String(ans)};
  }
  if(type==='color3_odd'){
    const sets=[
      {seq:'🔴 🔴 🔴 🔵',odd:'🔵',opts:['🔵','🔴','🟡']},
      {seq:'🟢 🟡 🟢 🟢',odd:'🟡',opts:['🟡','🟢','🔵']},
      {seq:'🟣 🟣 🟠 🟣',odd:'🟠',opts:['🟠','🟣','🔴']},
      {seq:'🔵 🔵 🔵 🟢',odd:'🟢',opts:['🟢','🔵','🟡']},
    ];
    const s=sets[Math.floor(Math.random()*sets.length)];
    const opts=[...s.opts];shuffle(opts);
    return{q:t('different'),seq:s.seq,opts,correct:s.odd};
  }
  if(type==='size_order'){
    const sets=[
      {seq:'🐤 🐔 ?',ans:'🦅',clue:lang==='ru'?'(растёт)':'(grows)',opts:['🦅','🐤','🥚']},
      {seq:'🌱 🌿 ?',ans:'🌳',clue:lang==='ru'?'(растёт)':'(grows)',opts:['🌳','🌱','🍃']},
      {seq:'🍼 🧒 ?',ans:'👨',clue:lang==='ru'?'(растёт)':'(grows)',opts:['👨','🍼','👶']},
    ];
    const s=sets[Math.floor(Math.random()*sets.length)];
    const opts=[...s.opts];shuffle(opts);
    return{q:t('whatShape'),seq:`${s.seq} ${s.clue||''}`,opts,correct:s.ans};
  }
  // fallback = fruit_odd
  return buildIMP('fruit_odd',lvl);
}

let maze,player,exitCell,puzzleSolved,collectibles;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');stopLoop();}

function buildLevelGrid(){

function selectChar(i){selectedChar=i;document.querySelectorAll('.char-card').forEach((c,j)=>c.classList.toggle('selected',i===j));setTimeout(showLevelSelect,300);}

function startLevel(lvl){
  currentLevel=lvl;stopConfetti();clearAutoNext();showScreen('gameScreen');
  document.getElementById('levelInfo').textContent=LEVEL_THEMES[lvl]+' '+(lang==='ru'?t('level')+' ':'Level ')+(lvl+1);

  requestAnimationFrame(()=>{setupCanvas(lvl);initGame(lvl);startLoop();});
}
function setupCanvas(lvl){
  canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
  const hh=document.getElementById('gameHeader').offsetHeight||54;
  const cb=document.getElementById('collectBar').offsetHeight||30;
  const ah=document.getElementById('arrowControls').offsetHeight||148;
  const W=window.innerWidth,H=window.innerHeight-hh-cb-ah-10;
  const grid=MAZES[lvl],rows=grid.length,cols=grid[0].length;
  const cs=Math.floor(Math.min((W-12)/cols,(H-8)/rows));
  cellSize=Math.max(cs,30);canvasW=cols*cellSize;canvasH=rows*cellSize;
  canvas.width=canvasW;canvas.height=canvasH;canvas.style.width=canvasW+'px';canvas.style.height=canvasH+'px';
}
function initGame(lvl){
  maze=MAZES[lvl];const sr=STARTS[lvl][0],sc=STARTS[lvl][1];
  player={row:sr,col:sc};exitCell={row:ENDS[lvl][0],col:ENDS[lvl][1]};
  puzzleSolved=false;inMazePuzzleActive=false;pendingCollectibleIdx=-1;
  const paths=[];
  for(let r=0;r<maze.length;r++)for(let c=0;c<maze[r].length;c++)
    if(maze[r][c]===0&&!(r===sr&&c===sc)&&!(r===ENDS[lvl][0]&&c===ENDS[lvl][1]))paths.push({r,c});
  shuffle(paths);
  const [cEmoji,cCount]=LEVEL_COLLECTIBLES[lvl];
  const realCount=Math.min(cCount,paths.length);
  collectibles=paths.slice(0,realCount).map((p,i)=>({
    row:p.r,col:p.c,collected:false,emoji:cEmoji,
    needsPuzzle:lvl>=5&&i===realCount-1
  }));
  updateCollectBar();
  canvas.ontouchstart=(e)=>{e.preventDefault();touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;};
  canvas.ontouchend=(e)=>{e.preventDefault();const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)<12&&Math.abs(dy)<12)return;if(Math.abs(dx)>Math.abs(dy))tryMove(dx>0?'right':'left');else tryMove(dy>0?'down':'up');};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function updateCollectBar(){
  const got=collectibles.filter(s=>s.collected).length;
  const total=collectibles.length;
  const emoji=collectibles.length>0?collectibles[0].emoji:'⭐';
  document.getElementById('collectIcon').textContent=emoji;
  document.getElementById('collectCount').textContent=`${got}/${total}`;
}

function tryMove(dir){
  if(document.getElementById('puzzleOverlay').classList.contains('active'))return;
  if(inMazePuzzleActive)return;
  let nr=player.row,nc=player.col;
  if(dir==='up')nr--;else if(dir==='down')nr++;else if(dir==='left')nc--;else if(dir==='right')nc++;
  if(nr<0||nr>=maze.length||nc<0||nc>=maze[0].length){playBump();return;}
  if(maze[nr][nc]===1){playBump();return;}
  player.row=nr;player.col=nc;playStep();
  collectibles.forEach((s,idx)=>{
    if(!s.collected&&s.row===nr&&s.col===nc){
      if(s.needsPuzzle){pendingCollectibleIdx=idx;showInMazePuzzle(idx);}
      else{s.collected=true;playCollect();updateCollectBar();}
    }
  });
  // Exit: require ALL collectibles collected
  if(nr===exitCell.row&&nc===exitCell.col){
    const allGot=collectibles.every(s=>s.collected);
    if(!allGot){
      const got=collectibles.filter(s=>s.collected).length;
      flashNotCollected(got,collectibles.length);
    } else if(puzzleSolved){
      doLevelComplete();
    } else {
      showPuzzle();
    }
  }
}

function flashNotCollected(got,total){
  playAlert();
  const bar=document.getElementById('collectBar');
  bar.style.background='rgba(255,80,80,0.9)';
  bar.style.color='white';
  document.getElementById('collectCount').textContent=`${got}/${total} — ${t('notAllCollected')}`;
  setTimeout(()=>{bar.style.background='rgba(255,255,255,0.9)';bar.style.color='#00796B';updateCollectBar();},1400);
}

function checkIMP(idx,chosenEnc,correctEnc){
  const chosen=decodeURIComponent(chosenEnc),correct=decodeURIComponent(correctEnc);
  const el=document.getElementById('impOpt'+idx);
  if(chosen===correct){
    el.classList.add('correct');document.getElementById('impMsg').textContent=randomSuccess();playCollect();
    setTimeout(()=>{
      document.getElementById('inMazePuzzleOverlay').classList.remove('active');
      inMazePuzzleActive=false;
      if(pendingCollectibleIdx>=0){collectibles[pendingCollectibleIdx].collected=true;updateCollectBar();pendingCollectibleIdx=-1;}
    },700);
  } else {
    el.classList.add('wrong');document.getElementById('impMsg').textContent=t('impWrong');
    setTimeout(()=>el.classList.remove('wrong'),500);
  }
}

let loopId=null;

function draw(){
  if(!ctx||!maze)return;
  const lvl=currentLevel,cs=cellSize,rows=maze.length,cols=maze[0].length;
  ctx.clearRect(0,0,canvasW,canvasH);ctx.fillStyle=LEVEL_BG[lvl];ctx.fillRect(0,0,canvasW,canvasH);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=c*cs,y=r*cs;
    if(maze[r][c]===1){
      ctx.fillStyle=WALL_COLORS[lvl];drawRR(x+1,y+1,cs-2,cs-2,7);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.24)';drawRR(x+3,y+3,cs-6,cs/3,4);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.11)';drawRR(x+1,y+cs*0.65,cs-2,cs*0.32,4);ctx.fill();
    } else {
      ctx.fillStyle=FLOOR_COLORS[lvl];ctx.fillRect(x,y,cs,cs);
    }
  }
  ctx.textAlign='center';ctx.textBaseline='middle';
  collectibles.forEach(s=>{
    if(!s.collected){
      const cx=s.col*cs+cs/2,cy=s.row*cs+cs/2;
      ctx.fillStyle=s.needsPuzzle?'rgba(255,200,60,0.95)':'rgba(255,255,150,0.92)';
      ctx.beginPath();ctx.arc(cx,cy,cs*0.4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=s.needsPuzzle?'rgba(255,120,0,0.95)':'rgba(255,190,0,0.9)';
      ctx.lineWidth=s.needsPuzzle?4:3;
      ctx.beginPath();ctx.arc(cx,cy,cs*0.4,0,Math.PI*2);ctx.stroke();
      if(s.needsPuzzle){
        ctx.font=(cs*0.19)+'px serif';ctx.fillStyle='#CC3300';
        ctx.fillText('🧩',cx+cs*0.23,cy-cs*0.23);
      }
      ctx.shadowColor='rgba(255,190,0,0.9)';ctx.shadowBlur=10;
      ctx.font=(cs*0.52)+'px serif';ctx.fillText(s.emoji,cx,cy);ctx.shadowBlur=0;
    }
  });
  drawExit(exitCell.col*cs,exitCell.row*cs,cs,puzzleSolved,collectibles.every(s=>s.collected));
  drawPlayer(player.col*cs+cs/2,player.row*cs+cs/2,cs);
}
function drawExit(x,y,cs,open,allCollected){
  ctx.fillStyle=FLOOR_COLORS[currentLevel];ctx.fillRect(x,y,cs,cs);
  const doorColor=open?'#33DD33':allCollected?'#DD9900':'#885522';
  ctx.fillStyle=doorColor;drawRR(x+cs*0.15,y+cs*0.05,cs*0.7,cs*0.9,7);ctx.fill();
  ctx.fillStyle=open?'#BBFFBB':allCollected?'#FFE080':'#FFD080';
  drawRR(x+cs*0.22,y+cs*0.1,cs*0.56,cs*0.8,5);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+cs*0.72,y+cs*0.52,cs*0.07,0,Math.PI*2);ctx.fill();
  ctx.font=(cs*0.36)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(open?'🚪':allCollected?'🔓':'🔒',x+cs/2,y+cs/2);
}
function drawPlayer(px,py,cs){
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='white';ctx.shadowBlur=14;
  ctx.font=(cs*0.78)+'px serif';ctx.fillText(CHARS[selectedChar],px,py);ctx.shadowBlur=0;
}
function drawRR(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function setupArrows(){
  const dirs={btnUp:'up',btnDown:'down',btnLeft:'left',btnRight:'right'};
  Object.entries(dirs).forEach(([id,dir])=>{
    const btn=document.getElementById(id);if(!btn)return;
    btn.addEventListener('mousedown',(e)=>{e.preventDefault();tryMove(dir);});
    btn.addEventListener('touchstart',(e)=>{e.preventDefault();tryMove(dir);stopArrows();moveTimer=setInterval(()=>tryMove(dir),280);},{passive:false});
    btn.addEventListener('touchend',(e)=>{e.preventDefault();stopArrows();},{passive:false});
    btn.addEventListener('touchcancel',(e)=>{e.preventDefault();stopArrows();},{passive:false});
  });
}
function stopArrows(){if(moveTimer){clearInterval(moveTimer);moveTimer=null;}}
const keyHeld={};
document.addEventListener('keydown',(e)=>{const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};if(map[e.key]){e.preventDefault();if(!keyHeld[e.key]){keyHeld[e.key]=true;tryMove(map[e.key]);}}});

    box.innerHTML=`<div class="puzzle-title">${t('howMany')}${fruit}?</div><div style="font-size:44px;letter-spacing:5px;margin:10px 0;word-break:break-all;">${fruit.repeat(rc)}</div><div style="display:flex;gap:14px;justify-content:center;margin:8px 0;">${opts.map(n=>`<div onclick="ep_checkNumber(${n},${rc})" id="numopt${n}" style="font-family:'Nunito',sans-serif;font-weight:900;font-size:46px;background:#E0F2F1;border-radius:17px;width:72px;height:72px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:5px solid #80CBC4;box-shadow:0 4px 10px rgba(0,0,0,0.1);">${n}</div>`).join('')}</div><div class="puz-msg" id="puzMsg"></div>`;

function ep_checkNumber(chosen,correct){
  const el=document.getElementById('numopt'+chosen);const msg=document.getElementById('puzMsg');
  if(chosen===correct){if(el){el.style.background='#AAFFAA';el.style.border='5px solid #44CC44';}msg.textContent=randomSuccess();msg.style.color='#00796B';playCollect();setTimeout(()=>closePuzzle(true),700);}
  else{if(el){el.style.background='#FFAAAA';el.style.border='5px solid #CC4444';}msg.textContent=t('tryAgain');msg.style.color='#CC2200';setTimeout(()=>{if(el){el.style.background='';el.style.border='5px solid #DDD';}},500);}
}
function ep_checkOdd(chosen,correct){
  const el=document.getElementById('odd'+chosen);const msg=document.getElementById('puzMsg');
  if(chosen===correct){el.style.border='6px solid #44CC44';el.style.background='rgba(170,255,170,0.4)';msg.textContent=randomSuccess();msg.style.color='#00796B';playCollect();setTimeout(()=>closePuzzle(true),700);}
  else{el.style.border='6px solid #FF4444';el.style.background='rgba(255,170,170,0.4)';msg.textContent=t('tryAgain');msg.style.color='#CC2200';setTimeout(()=>{el.style.border='5px solid transparent';el.style.background='';},500);}
}
function ep_checkTextOption(chosenEnc,correctEnc){
  const chosen=decodeURIComponent(chosenEnc),correct=decodeURIComponent(correctEnc);
  const msg=document.getElementById('puzMsg');
  if(chosen===correct){msg.textContent=randomSuccess();msg.style.color='#00796B';playCollect();setTimeout(()=>closePuzzle(true),700);}
  else{msg.textContent=t('tryAgain');msg.style.color='#CC2200';}
}
function ep_clickApple(i,ok,needed){
  const el=document.getElementById('ap'+i);if(!el||el.dataset.done)return;const msg=document.getElementById('puzMsg');
  if(ok){el.dataset.done='1';el.style.filter='drop-shadow(0 0 13px #FF6600)';el.style.transform='scale(1.25)';_pickCount++;playCollect();if(_pickCount>=needed){msg.textContent=randomSuccess();msg.style.color='#00796B';setTimeout(()=>{_pickCount=0;closePuzzle(true);},700);}}
  else{el.style.animation='shake 0.3s';msg.textContent=t('notThat');msg.style.color='#CC2200';setTimeout(()=>el.style.animation='',350);}
}
function ep_clickPiece(prefix,i,emojiEnc,orderEnc){
  const emoji=decodeURIComponent(emojiEnc),order=orderEnc.split(',').map(decodeURIComponent);
  const count=window._miniPuzzleCount||0,el=document.getElementById(prefix+i);const msg=document.getElementById('puzMsg');
  if(!el||el.dataset.done)return;
  if(emoji===order[count]){el.classList.add('correct');el.dataset.done='1';window._miniPuzzleCount=count+1;playCollect();if(window._miniPuzzleCount>=order.length){msg.textContent=randomSuccess();msg.style.color='#00796B';setTimeout(()=>closePuzzle(true),700);}}
  else{el.classList.add('wrong');msg.textContent=t('tryAgain');msg.style.color='#CC2200';setTimeout(()=>el.classList.remove('wrong'),400);}
}
function ep_clickColorCircle(i,ok,needed){
  const el=document.getElementById('cc'+i);if(!el||el.dataset.done)return;const msg=document.getElementById('puzMsg');
  if(ok){el.dataset.done='1';el.style.transform='scale(1.2)';el.style.boxShadow='0 0 18px #FFD700';el.style.border='6px solid #FFD700';_pickCount++;playCollect();if(_pickCount>=needed){msg.textContent=randomSuccess();msg.style.color='#00796B';setTimeout(()=>{_pickCount=0;closePuzzle(true);},700);}}
  else{el.style.animation='shake 0.3s';msg.textContent=t('notThat');msg.style.color='#CC2200';setTimeout(()=>el.style.animation='',350);}
}
function setupDrag(){
  const key=document.getElementById('dragKey'),lock=document.getElementById('lockTarget');let dragging=false,ox=0,oy=0;
  function gp(e){const t2=e.touches?e.touches[0]:e;const r=document.getElementById('dragArea').getBoundingClientRect();return{x:t2.clientX-r.left,y:t2.clientY-r.top};}
  function start(e){e.preventDefault();dragging=true;const p=gp(e);ox=p.x-key.offsetLeft;oy=p.y-key.offsetTop;}
  function move(e){if(!dragging)return;e.preventDefault();const p=gp(e);key.style.left=Math.max(0,p.x-ox)+'px';key.style.top=Math.max(0,p.y-oy)+'px';}
  function end(e){if(!dragging)return;dragging=false;const kr=key.getBoundingClientRect(),lr=lock.getBoundingClientRect();const ov=!(kr.right<lr.left||kr.left>lr.right||kr.bottom<lr.top||kr.top>lr.bottom);if(ov){const msg=document.getElementById('puzMsg');msg.textContent=t('unlocked');msg.style.color='#00796B';lock.textContent='🔓';key.textContent='✨';playCollect();setTimeout(()=>closePuzzle(true),700);}}
  key.addEventListener('mousedown',start);window.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  key.addEventListener('touchstart',start,{passive:false});window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',end);
}

// ===== CONFETTI =====
let confettiRaf=null;
const confParts=[];
function startConfetti(durationMs){
  const cc=document.getElementById('confettiCanvas');cc.width=window.innerWidth;cc.height=window.innerHeight;
  confParts.length=0;
  for(let i=0;i<110;i++)confParts.push({x:Math.random()*cc.width,y:Math.random()*cc.height-cc.height,vx:(Math.random()-0.5)*5,vy:Math.random()*5+2,color:['#4DB6AC','#FFE033','#FF8C69','#80CBC4','#66BBFF','#FFEE33','#66EE66','#FF9933'][Math.floor(Math.random()*8)],r:Math.random()*11+4,angle:Math.random()*360,va:(Math.random()-0.5)*9});
  const cctx=cc.getContext('2d');const startTime=Date.now();const fadeDur=1200;
  if(confettiRaf)cancelAnimationFrame(confettiRaf);
  function anim(){
    const elapsed=Date.now()-startTime;
    if(elapsed>=durationMs){stopConfetti();return;}
    const alpha=elapsed>durationMs-fadeDur?Math.max(0,1-(elapsed-(durationMs-fadeDur))/fadeDur):1;
    cctx.clearRect(0,0,cc.width,cc.height);cctx.globalAlpha=alpha;
    confParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;if(p.y>cc.height){p.y=-20;p.x=Math.random()*cc.width;}cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);cctx.fillStyle=p.color;cctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);cctx.restore();});
    cctx.globalAlpha=1;confettiRaf=requestAnimationFrame(anim);
  }
  anim();
}
function stopConfetti(){if(confettiRaf){cancelAnimationFrame(confettiRaf);confettiRaf=null;}const cc=document.getElementById('confettiCanvas');if(cc){const c=cc.getContext('2d');c.globalAlpha=1;c.clearRect(0,0,cc.width,cc.height);}}

// ===== CLOUDS =====
function createClouds(){
  ['titleScreen','charScreen','levelScreen','victoryScreen','finalScreen'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    for(let i=0;i<4;i++){const cl=document.createElement('div');cl.className='cloud';const w=80+Math.random()*130,h=34+Math.random()*24;cl.style.cssText=`width:${w}px;height:${h}px;top:${4+Math.random()*25}%;animation-duration:${16+Math.random()*14}s;animation-delay:${-Math.random()*22}s;z-index:0;`;const b=document.createElement('div');b.style.cssText=`width:${w*0.6}px;height:${h*1.3}px;top:-${h*0.5}px;left:${w*0.1}px;background:rgba(255,255,255,0.7);border-radius:50%;position:absolute;`;const a=document.createElement('div');a.style.cssText=`width:${w*0.5}px;height:${h*1.1}px;top:-${h*0.35}px;right:${w*0.1}px;background:rgba(255,255,255,0.7);border-radius:50%;position:absolute;`;cl.appendChild(b);cl.appendChild(a);s.appendChild(cl);}
  });
}

// ===== TELEGRAM =====
function initTelegram(){
  const tg=window.Telegram?.WebApp;if(!tg)return;tg.ready();tg.expand();
  try{tg.setHeaderColor('#4DB6AC');tg.setBackgroundColor('#4DB6AC');}catch(e){}
  tg.BackButton.onClick(()=>{const active=document.querySelector('.screen.active');if(!active)return;const id=active.id;if(id==='charScreen')showTitle();else if(id==='levelScreen')showCharSelect();else if(id==='gameScreen'){clearAutoNext();showLevelSelect();}else if(id==='victoryScreen'){clearAutoNext();showLevelSelect();}else if(id==='finalScreen')showCharSelect();else tg.BackButton.hide();});
  const _orig=showScreen;window.showScreen=function(id){_orig(id);if(id==='titleScreen')tg.BackButton.hide();else tg.BackButton.show();};
  tg.disableVerticalSwipes?.();
}

window.onload=()=>{createClouds();setupArrows();initTelegram();updateAllText();document.addEventListener('touchmove',(e)=>{if(e.target.id==='gameCanvas')e.preventDefault();},{passive:false});};
</script>
